# nginx.conf
# Load balancer untuk Quiz Service.
# Mendistribusikan request dari Vue frontend ke 3 node quiz-service
# menggunakan strategi round-robin (default nginx upstream).
# Diadopsi dari konsep load balancing di order_service.py demo,
# tapi dipindahkan ke level infrastruktur menggunakan Nginx.

upstream quiz_nodes {
    # Round-robin ke 3 node Quiz Service
    server quiz-1:5000;
    server quiz-2:5000;
    server quiz-3:5000;
}

server {
    listen 80;

    # Semua request ke /api/* diteruskan ke Quiz Service
    location /api/ {
        proxy_pass         http://quiz_nodes;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Request ke /status, /election, /coordinator, /heartbeat
    # juga diteruskan ke Quiz Service (untuk monitoring)
    location ~ ^/(status|election|coordinator|heartbeat|rpc) {
        proxy_pass         http://quiz_nodes;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
    }

    # Semua request lainnya dilayani sebagai static file Vue
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # Penting untuk Vue Router agar halaman tidak 404 saat refresh
        try_files $uri $uri/ /index.html;
    }
}
